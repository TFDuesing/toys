<!DOCTYPE html>
<!-- snippets app -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://snippets-worker.tfduesing.workers.dev;">
  <title>Snippets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, Helvetica, Arial, sans-serif;
      background: #faf8f5;
      color: #2a2a2a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .demo-banner {
      background: #f0c040;
      color: #5a4400;
      text-align: center;
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0dbd4;
      padding: 0.9rem 1.25rem;
      flex-shrink: 0;

      & h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #b5556e;
        letter-spacing: -0.01em;
        text-wrap: balance;

        & span {
          font-weight: 400;
          font-size: 0.85rem;
          color: #999;
          margin-inline-start: 0.5rem;
        }
      }
    }

    .app {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .client-list {
      width: 260px;
      background: #fff;
      border-inline-end: 1px solid #e0dbd4;
      overflow-y: auto;
      flex-shrink: 0;

      & button {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        width: 100%;
        padding: 0.85rem 1rem;
        border: none;
        border-bottom: 1px solid #f0ece6;
        background: transparent;
        text-align: start;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.92rem;
        color: #333;
        transition: background 0.12s;

        &:hover {
          background: #fdf5ee;
        }

        &.active {
          background: #fdf0e8;
          border-inline-start: 3px solid #b5556e;
          font-weight: 600;

          & .client-avatar {
            background: #b5556e;
            color: #fff;
          }
        }
      }
    }

    .client-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e8d5c4;
      color: #8a6550;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
    }

    .notes-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;

      & textarea {
        flex: 1;
        border: none;
        outline: none;
        padding: 1rem 1.25rem;
        font-family: inherit;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #333;
        background: #fefcfa;
        resize: none;

        &::placeholder {
          color: #ccc;
        }
      }
    }

    .notes-header {
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid #f0ece6;
      background: #fefcfa;
      flex-shrink: 0;

      & h2 {
        font-size: 1.05rem;
        font-weight: 600;
        color: #444;
        text-wrap: balance;
      }

      & p {
        font-size: 0.78rem;
        color: #999;
        margin-top: 0.15rem;
      }

      & .name-row {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      & .client-name-input {
        font-size: 1.05rem;
        font-weight: 600;
        color: #444;
        border: 1px solid transparent;
        border-radius: 4px;
        padding: 0.15rem 0.35rem;
        margin: -0.15rem -0.35rem;
        background: transparent;
        font-family: inherit;
        outline: none;
        min-width: 0;
        flex: 1;

        &:hover {
          border-color: #e0dbd4;
        }

        &:focus {
          border-color: #b5556e;
          background: #fff;
        }
      }
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 0.95rem;
      text-align: center;
      padding: 1rem;

      &.error {
        color: #c0392b;
      }
    }

    .client-list-status {
      padding: 0.85rem 1rem;
      color: #bbb;
      font-size: 0.9rem;
      text-align: center;

      &.error {
        color: #c0392b;
      }
    }

    .save-indicator {
      font-size: 0.75rem;
      color: #bbb;
      margin-inline-start: 0.5rem;
      flex-shrink: 0;

      &.saving { color: #b5556e; }
      &.error { color: #c0392b; }
    }

    .add-client-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-bottom: 1px solid #e0dbd4;
      background: #fefcfa;
      color: #b5556e;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;

      &:hover {
        background: #fdf0e8;
      }
    }

    .delete-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid #f0ece6;
      background: #fefcfa;
      flex-shrink: 0;

      & .delete-btn {
        border: none;
        background: transparent;
        color: #999;
        font-family: inherit;
        font-size: 0.78rem;
        padding: 0.3rem 0;
        cursor: pointer;
        transition: color 0.12s;

        &:hover {
          color: #c0392b;
        }
      }
    }

    .back-btn {
      display: none;
      border: none;
      background: transparent;
      color: #b5556e;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      margin-inline-end: 0.5rem;
    }

    @media (max-width: 600px) {
      .app {
        flex-direction: column;

        & .client-list {
          width: 100%;
          border-inline-end: none;
          border-bottom: 1px solid #e0dbd4;
        }

        &.show-notes .client-list { display: none; }
        &:not(.show-notes) .notes-panel { display: none; }
        &.show-notes .back-btn { display: inline; }
      }
    }
  </style>
</head>
<body>
  <div class="demo-banner">βeta — shared demo data, synced across visitors</div>
  <header>
    <h1>Snippets <span>Client Notes</span></h1>
  </header>
  <div class="app" id="app">
    <div class="client-list" id="clientList"></div>
    <div class="notes-panel" id="notesPanel">
      <div class="empty-state" id="emptyState">Loading…</div>
    </div>
  </div>

  <script>
    const API_URL = "https://snippets-worker.tfduesing.workers.dev/clients";

    let clients = [];
    let selectedId = null;
    const pendingSaves = new Map(); // id -> { timeout, patch, indicator }

    const app = document.getElementById("app");
    const clientList = document.getElementById("clientList");
    const notesPanel = document.getElementById("notesPanel");

    function getInitials(name) {
      return (name || "?").split(" ").map(w => w[0]).filter(Boolean).join("").toUpperCase() || "?";
    }

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_URL}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      return res.status === 204 ? null : res.json();
    }

    function renderMessage(message, className = "empty-state") {
      notesPanel.innerHTML = "";
      const div = document.createElement("div");
      div.className = className;
      div.textContent = message;
      notesPanel.appendChild(div);
    }

    function renderError(message) {
      renderMessage(message, "empty-state error");
    }

    function renderEmpty() {
      renderMessage("Select a client to view notes");
    }

    function renderClientList() {
      clientList.innerHTML = "";

      const addBtn = document.createElement("button");
      addBtn.className = "add-client-btn";
      addBtn.textContent = "+ Add Client";
      addBtn.onclick = addClient;
      clientList.appendChild(addBtn);

      clients.forEach(c => {
        const btn = document.createElement("button");
        btn.className = c.id === selectedId ? "active" : "";
        const avatar = document.createElement("div");
        avatar.className = "client-avatar";
        avatar.textContent = getInitials(c.name);
        const label = document.createElement("span");
        label.textContent = c.name || "(unnamed)";
        btn.appendChild(avatar);
        btn.appendChild(label);
        btn.onclick = () => selectClient(c.id);
        clientList.appendChild(btn);
      });
    }

    async function loadClients() {
      try {
        const data = await apiFetch("");
        clients = data.clients;
        renderClientList();
        renderEmpty();
      } catch (err) {
        clientList.innerHTML = "";
        const status = document.createElement("div");
        status.className = "client-list-status error";
        status.textContent = `Failed to load: ${err.message}`;
        clientList.appendChild(status);
        renderError(`Could not load clients: ${err.message}`);
      }
    }

    async function addClient() {
      try {
        const newClient = await apiFetch("", {
          method: "POST",
          body: JSON.stringify({ name: "New Client", notes: "" }),
        });
        clients.unshift(newClient);
        selectClient(newClient.id);
      } catch (err) {
        alert(`Failed to add client: ${err.message}`);
      }
    }

    async function deleteClient(id) {
      if (!confirm("Delete this client and all their notes?")) return;
      try {
        await apiFetch(`/${id}`, { method: "DELETE" });
        pendingSaves.delete(id);
        clients = clients.filter(c => c.id !== id);
        selectedId = null;
        app.classList.remove("show-notes");
        renderClientList();
        renderEmpty();
      } catch (err) {
        alert(`Failed to delete: ${err.message}`);
      }
    }

    function schedulePatch(client, patch, indicator) {
      const existing = pendingSaves.get(client.id);
      if (existing) {
        clearTimeout(existing.timeout);
        Object.assign(existing.patch, patch);
        existing.indicator = indicator;
      }
      const entry = existing || { patch: { ...patch }, indicator };
      entry.timeout = setTimeout(() => flushPatch(client), 400);
      pendingSaves.set(client.id, entry);
      setIndicator(indicator, "saving", "Saving\u2026");
    }

    async function flushPatch(client) {
      const entry = pendingSaves.get(client.id);
      if (!entry) return;
      pendingSaves.delete(client.id);
      try {
        await apiFetch(`/${client.id}`, {
          method: "PATCH",
          body: JSON.stringify(entry.patch),
        });
        setIndicator(entry.indicator, "", "Saved");
        setTimeout(() => {
          if (entry.indicator && entry.indicator.textContent === "Saved") {
            setIndicator(entry.indicator, "", "");
          }
        }, 1200);
      } catch (err) {
        setIndicator(entry.indicator, "error", `Save failed: ${err.message}`);
      }
    }

    function setIndicator(el, className, text) {
      if (!el) return;
      el.className = `save-indicator ${className}`.trim();
      el.textContent = text;
    }

    function selectClient(id) {
      selectedId = id;
      const client = clients.find(c => c.id === id);
      renderClientList();

      notesPanel.innerHTML = "";

      const header = document.createElement("div");
      header.className = "notes-header";

      const nameRow = document.createElement("div");
      nameRow.className = "name-row";

      const backBtn = document.createElement("button");
      backBtn.className = "back-btn";
      backBtn.textContent = "\u2190 Back";
      backBtn.onclick = () => { selectedId = null; app.classList.remove("show-notes"); renderClientList(); renderEmpty(); };

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.className = "client-name-input";
      nameInput.value = client.name;

      const indicator = document.createElement("span");
      indicator.className = "save-indicator";

      nameInput.oninput = () => {
        client.name = nameInput.value;
        // Update the list label live; server save is debounced.
        renderClientList();
        schedulePatch(client, { name: nameInput.value }, indicator);
      };

      nameRow.appendChild(backBtn);
      nameRow.appendChild(nameInput);
      nameRow.appendChild(indicator);

      const p = document.createElement("p");
      p.textContent = "Click name to edit \u00b7 notes auto-save";

      header.appendChild(nameRow);
      header.appendChild(p);
      notesPanel.appendChild(header);

      const textarea = document.createElement("textarea");
      textarea.value = client.notes;
      textarea.placeholder = "Add notes about this client\u2026";
      textarea.oninput = () => {
        client.notes = textarea.value;
        schedulePatch(client, { notes: textarea.value }, indicator);
      };
      notesPanel.appendChild(textarea);

      const deleteFooter = document.createElement("div");
      deleteFooter.className = "delete-footer";
      const delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.textContent = "Delete client";
      delBtn.onclick = () => deleteClient(id);
      deleteFooter.appendChild(delBtn);
      notesPanel.appendChild(deleteFooter);

      app.classList.add("show-notes");

      if (client.name === "New Client") {
        nameInput.select();
      }
    }

    // Flush any pending saves before unload so trailing edits aren't lost.
    window.addEventListener("beforeunload", () => {
      for (const [id, entry] of pendingSaves) {
        clearTimeout(entry.timeout);
        fetch(`${API_URL}/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(entry.patch),
          keepalive: true,
        }).catch(() => {});
      }
    });

    loadClients();
  </script>
</body>
</html>
