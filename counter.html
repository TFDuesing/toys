<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f5f0;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #count {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 1.25rem 0 2rem;
      min-height: 1em;
      color: #111;
    }

    #count.loading {
      color: #ccc;
      font-size: 3rem;
      padding-top: 1rem;
    }

    button {
      background: #1a6fb5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }

    button:hover:not(:disabled) {
      background: #155fa0;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #888;
      min-height: 1.2em;
    }

    #status.error {
      color: #c0392b;
    }

    .back {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #888;
      text-decoration: none;
    }

    .back:hover { color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Global Counter</h1>
    <div id="count" class="loading">…</div>
    <button id="btn" disabled>+1</button>
    <div id="status"></div>
  </div>
  <a class="back" href="index.html">← back</a>

  <script>
    // ─── Configuration ────────────────────────────────────────────────────────
    // Counter is stored in Cloudflare D1 via a Worker proxy.
    // After deploying counter-worker, replace the placeholder below with the
    // URL printed by `wrangler deploy` (e.g. https://counter-worker.<subdomain>.workers.dev)
    const WORKER_URL = 'https://counter-worker.tfduesing.workers.dev';
    // ─────────────────────────────────────────────────────────────────────────

    const countEl  = document.getElementById('count');
    const btn      = document.getElementById('btn');
    const statusEl = document.getElementById('status');

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className   = isError ? 'error' : '';
    }

    async function fetchCounter() {
      countEl.className   = 'loading';
      countEl.textContent = '…';
      btn.disabled = true;
      setStatus('');

      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { count } = await res.json();
        countEl.textContent = count.toLocaleString();
        countEl.className   = '';
        btn.disabled = (WORKER_URL === 'REPLACE_WITH_YOUR_WORKER_URL');
        if (btn.disabled) setStatus('Worker URL not configured.', true);
      } catch (err) {
        setStatus(`Failed to load counter: ${err.message}`, true);
        countEl.textContent = '?';
        countEl.className   = '';
      }
    }

    async function increment() {
      btn.disabled = true;
      setStatus('Saving…');

      try {
        const res = await fetch(WORKER_URL, { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { count } = await res.json();
        countEl.textContent = count.toLocaleString();
        setStatus('');
        btn.disabled = false;
      } catch (err) {
        setStatus(`Error: ${err.message}`, true);
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', increment);
    fetchCounter();
  </script>
</body>
</html>
