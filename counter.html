<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://counter-worker.tfduesing.workers.dev wss://counter-worker.tfduesing.workers.dev;">
  <title>Global Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, Helvetica, Arial, sans-serif;
      background: #f5f5f0;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #count {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 1.25rem 0 2rem;
      min-height: 1em;
      color: #111;
    }

    #count.loading {
      color: #ccc;
      font-size: 3rem;
      padding-top: 1rem;
    }

    button {
      background: #1a6fb5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }

    button:hover:not(:disabled) {
      background: #155fa0;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #888;
      min-height: 1.2em;
    }

    #status.error {
      color: #c0392b;
    }

    .back {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #888;
      text-decoration: none;
    }

    .back:hover { color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Global Counter</h1>
    <div id="count" class="loading">…</div>
    <button id="btn" disabled>+1</button>
    <div id="status"></div>
  </div>
  <a class="back" href="index.html">← back</a>

  <script>
    // ─── Configuration ────────────────────────────────────────────────────────
    // Counter is stored in Cloudflare D1 via a Worker proxy.
    // After deploying counter-worker, replace the placeholder below with the
    // URL printed by `wrangler deploy` (e.g. https://counter-worker.<subdomain>.workers.dev)
    const WORKER_URL = 'https://counter-worker.tfduesing.workers.dev';
    // ─────────────────────────────────────────────────────────────────────────

    // ─── Silly Sounds ────────────────────────────────────────────────────────
    let audioCtx = null;

    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function makeNoise(ctx, duration) {
      const sr = ctx.sampleRate;
      const buf = ctx.createBuffer(1, sr * duration, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    // 1. Aoogah — old car horn
    function aoogah(ctx) {
      const t = ctx.currentTime;
      const g = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 1200;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.04);
      g.gain.setValueAtTime(0.25, t + 0.3);
      g.gain.linearRampToValueAtTime(0.08, t + 0.38);
      g.gain.linearRampToValueAtTime(0.28, t + 0.45);
      g.gain.setValueAtTime(0.28, t + 0.65);
      g.gain.linearRampToValueAtTime(0, t + 0.85);
      filt.connect(g).connect(ctx.destination);
      for (const detune of [0, 7]) {
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.detune.value = detune;
        o.frequency.setValueAtTime(280, t);
        o.frequency.exponentialRampToValueAtTime(380, t + 0.18);
        o.frequency.exponentialRampToValueAtTime(260, t + 0.38);
        o.frequency.exponentialRampToValueAtTime(400, t + 0.52);
        o.frequency.exponentialRampToValueAtTime(230, t + 0.85);
        o.connect(filt);
        o.start(t); o.stop(t + 0.85);
      }
    }

    // 2. Clown horn
    function clownHorn(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(310, t);
      o.frequency.linearRampToValueAtTime(280, t + 0.25);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.015);
      g.gain.setValueAtTime(0.22, t + 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + 0.3);
      // air puff
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.2);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 300; bp.Q.value = 5;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0, t + 0.02);
      ng.gain.linearRampToValueAtTime(0.12, t + 0.04);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      ns.connect(bp).connect(ng).connect(ctx.destination);
      ns.start(t + 0.02); ns.stop(t + 0.22);
    }

    // 3. Boing
    function boing(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(600, t);
      o.frequency.exponentialRampToValueAtTime(200, t + 0.5);
      // harmonic
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(1200, t);
      o2.frequency.exponentialRampToValueAtTime(400, t + 0.5);
      g2.gain.value = 0.06;
      // vibrato LFO for spring wobble
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.setValueAtTime(20, t);
      lfo.frequency.linearRampToValueAtTime(8, t + 0.5);
      lfoG.gain.setValueAtTime(60, t);
      lfoG.gain.linearRampToValueAtTime(15, t + 0.5);
      lfo.connect(lfoG);
      lfoG.connect(o.frequency);
      lfoG.connect(o2.frequency);
      g.gain.setValueAtTime(0.25, t);
      g.gain.linearRampToValueAtTime(0, t + 0.55);
      o.connect(g).connect(ctx.destination);
      o2.connect(g2).connect(ctx.destination);
      lfo.start(t); o.start(t); o2.start(t);
      lfo.stop(t + 0.55); o.stop(t + 0.55); o2.stop(t + 0.55);
    }

    // 4. Sad trombone — wah wah wah waaaah
    function sadTrombone(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      o.type = 'sawtooth';
      filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 2;
      const notes = [233, 220, 208, 196];
      const nd = 0.35;
      g.gain.setValueAtTime(0, t);
      for (let i = 0; i < 4; i++) {
        const nt = t + i * nd;
        o.frequency.setValueAtTime(notes[i], nt);
        g.gain.linearRampToValueAtTime(0.2, nt + 0.03);
        if (i < 3) {
          g.gain.setValueAtTime(0.2, nt + nd - 0.04);
          g.gain.linearRampToValueAtTime(0.05, nt + nd);
        }
      }
      // last note: vibrato + long decay
      const lastStart = t + 3 * nd;
      const vib = ctx.createOscillator();
      const vibG = ctx.createGain();
      vib.frequency.value = 5; vibG.gain.value = 8;
      vib.connect(vibG).connect(o.frequency);
      vib.start(lastStart); vib.stop(lastStart + 0.6);
      g.gain.setValueAtTime(0.2, lastStart + 0.3);
      g.gain.linearRampToValueAtTime(0, lastStart + 0.55);
      o.connect(filt).connect(g).connect(ctx.destination);
      o.start(t); o.stop(lastStart + 0.6);
    }

    // 5. Short toot (fart)
    function fartToot(ctx) {
      const t = ctx.currentTime;
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.25);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 250; bp.Q.value = 3;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      ns.connect(bp).connect(g).connect(ctx.destination);
      ns.start(t); ns.stop(t + 0.2);
    }

    // 6. Long rip (fart)
    function fartRip(ctx) {
      const t = ctx.currentTime;
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.6);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.setValueAtTime(300, t);
      bp.frequency.linearRampToValueAtTime(200, t + 0.5);
      bp.Q.value = 3;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.04);
      g.gain.setValueAtTime(0.25, t + 0.35);
      g.gain.linearRampToValueAtTime(0, t + 0.5);
      ns.connect(bp).connect(g).connect(ctx.destination);
      ns.start(t); ns.stop(t + 0.5);
    }

    // 7. Squeaker (fart)
    function fartSqueaker(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(400, t);
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = 25; lfoG.gain.value = 80;
      lfo.connect(lfoG).connect(o.frequency);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.connect(g).connect(ctx.destination);
      lfo.start(t); o.start(t);
      lfo.stop(t + 0.15); o.stop(t + 0.15);
    }

    // 8. Bubbler (fart)
    function fartBubbler(ctx) {
      const t = ctx.currentTime;
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.5);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.setValueAtTime(220, t);
      bp.frequency.linearRampToValueAtTime(190, t + 0.4);
      bp.Q.value = 4;
      const g = ctx.createGain();
      // pulse the gain with a square LFO for bubbling
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.type = 'square'; lfo.frequency.value = 12;
      lfoG.gain.value = 0.15;
      g.gain.setValueAtTime(0.15, t);
      g.gain.linearRampToValueAtTime(0, t + 0.4);
      lfo.connect(lfoG).connect(g.gain);
      ns.connect(bp).connect(g).connect(ctx.destination);
      lfo.start(t); ns.start(t);
      lfo.stop(t + 0.4); ns.stop(t + 0.4);
    }

    // 9. Slide whistle up
    function slideUp(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(1200, t + 0.35);
      g.gain.setValueAtTime(0.2, t);
      g.gain.setValueAtTime(0.2, t + 0.32);
      g.gain.linearRampToValueAtTime(0, t + 0.4);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + 0.4);
    }

    // 10. Slide whistle down
    function slideDown(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1200, t);
      o.frequency.exponentialRampToValueAtTime(400, t + 0.35);
      g.gain.setValueAtTime(0.2, t);
      g.gain.setValueAtTime(0.2, t + 0.32);
      g.gain.linearRampToValueAtTime(0, t + 0.4);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + 0.4);
    }

    // 11. Duck quack
    function duckQuack(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const bp = ctx.createBiquadFilter();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(350, t);
      o.frequency.linearRampToValueAtTime(450, t + 0.03);
      o.frequency.linearRampToValueAtTime(340, t + 0.12);
      bp.type = 'bandpass'; bp.frequency.value = 600; bp.Q.value = 3;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.01);
      g.gain.setValueAtTime(0.22, t + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.connect(bp).connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + 0.25);
    }

    // 12. Bicycle horn — beep beep
    function bicycleHorn(ctx) {
      const t = ctx.currentTime;
      for (let i = 0; i < 2; i++) {
        const offset = i * 0.18;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'triangle';
        o.frequency.value = 480;
        g.gain.setValueAtTime(0, t + offset);
        g.gain.linearRampToValueAtTime(0.22, t + offset + 0.01);
        g.gain.setValueAtTime(0.22, t + offset + 0.08);
        g.gain.linearRampToValueAtTime(0, t + offset + 0.12);
        o.connect(g).connect(ctx.destination);
        o.start(t + offset); o.stop(t + offset + 0.12);
      }
    }

    // 13. Whoopee cushion
    function whoopeeCushion(ctx) {
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.1);
      g.gain.setValueAtTime(0.2, t + 0.4);
      g.gain.linearRampToValueAtTime(0, t + 0.7);
      g.connect(ctx.destination);
      // low layer
      const n1 = ctx.createBufferSource();
      n1.buffer = makeNoise(ctx, 0.8);
      const bp1 = ctx.createBiquadFilter();
      bp1.type = 'bandpass'; bp1.frequency.value = 200; bp1.Q.value = 1.5;
      n1.connect(bp1).connect(g);
      n1.start(t); n1.stop(t + 0.7);
      // high wheeze layer
      const n2 = ctx.createBufferSource();
      n2.buffer = makeNoise(ctx, 0.8);
      const bp2 = ctx.createBiquadFilter();
      bp2.type = 'bandpass'; bp2.frequency.value = 400; bp2.Q.value = 2;
      const g2 = ctx.createGain();
      g2.gain.value = 0.5;
      n2.connect(bp2).connect(g2).connect(g);
      n2.start(t); n2.stop(t + 0.7);
    }

    // 14. Kazoo
    function kazoo(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const filt = ctx.createBiquadFilter();
      const g = ctx.createGain();
      const trem = ctx.createOscillator();
      const tremG = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = 350;
      filt.type = 'lowpass'; filt.frequency.value = 1500;
      trem.frequency.value = 50; tremG.gain.value = 0.12;
      trem.connect(tremG).connect(g.gain);
      g.gain.setValueAtTime(0.18, t);
      g.gain.setValueAtTime(0.18, t + 0.22);
      g.gain.linearRampToValueAtTime(0, t + 0.3);
      o.connect(filt).connect(g).connect(ctx.destination);
      trem.start(t); o.start(t);
      trem.stop(t + 0.3); o.stop(t + 0.3);
    }

    const sillySounds = [
      aoogah, clownHorn, boing, sadTrombone,
      fartToot, fartRip, fartSqueaker, fartBubbler,
      slideUp, slideDown, duckQuack,
      bicycleHorn, whoopeeCushion, kazoo
    ];

    function playSillySound() {
      const ctx = ensureAudioCtx();
      sillySounds[Math.floor(Math.random() * sillySounds.length)](ctx);
    }
    // ─────────────────────────────────────────────────────────────────────────

    const countEl  = document.getElementById('count');
    const btn      = document.getElementById('btn');
    const statusEl = document.getElementById('status');

    let ws = null;
    let reconnectDelay = 1000;
    let lastCount = null;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className   = isError ? 'error' : '';
    }

    function updateCount(count) {
      if (count === lastCount) return;
      lastCount = count;
      countEl.textContent = count.toLocaleString();
      countEl.className   = '';
    }

    // ─── WebSocket ─────────────────────────────────────────────────────────────
    function connectWebSocket() {
      const wsUrl = WORKER_URL.replace(/^http/, 'ws');
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        reconnectDelay = 1000;
        btn.disabled = false;
        setStatus('');
      };

      ws.onmessage = (e) => {
        try {
          const { count } = JSON.parse(e.data);
          if (count !== undefined) updateCount(count);
        } catch (err) {
          console.warn('WebSocket message parse error:', err.message);
        }
      };

      ws.onclose = () => {
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose will fire after this
      };
    }

    function scheduleReconnect() {
      setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        connectWebSocket();
      }, reconnectDelay);
    }

    // ─── Core ──────────────────────────────────────────────────────────────────
    async function fetchCounter() {
      countEl.className   = 'loading';
      countEl.textContent = '…';
      btn.disabled = true;
      setStatus('');

      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { count } = await res.json();
        updateCount(count);
        connectWebSocket();
      } catch (err) {
        setStatus(`Failed to load counter: ${err.message}`, true);
        countEl.textContent = '?';
        countEl.className   = '';
      }
    }

    async function increment() {
      playSillySound();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('increment');
      } else {
        // Fallback to HTTP if WebSocket is not connected
        btn.disabled = true;
        setStatus('Saving…');
        try {
          const res = await fetch(WORKER_URL, { method: 'POST' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { count } = await res.json();
          updateCount(count);
          setStatus('');
          btn.disabled = false;
        } catch (err) {
          setStatus(`Error: ${err.message}`, true);
          btn.disabled = false;
        }
      }
    }

    btn.addEventListener('click', increment);
    fetchCounter();
  </script>
</body>
</html>
