<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://counter-worker.tfduesing.workers.dev wss://counter-worker.tfduesing.workers.dev;">
  <title>Global Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --text: #222;
      --muted: #888;
      --accent: #1a6fb5;
      --accent-hover: #155fa0;
      --card: #fff;
      --border: #ddd;
      --error: #c0392b;
    }

    body {
      font-family: system-ui, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    #count {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 1.25rem 0 2rem;
      min-height: 1em;
      color: #111;

      &.loading {
        color: #ccc;
        font-size: 3rem;
        padding-top: 1rem;
      }
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;

      &:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      &:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
    }

    #status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2em;

      &.error {
        color: var(--error);
      }
    }

    .back {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;

      &:hover { color: #444; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Global Counter</h1>
    <div id="count" class="loading">…</div>
    <button id="btn" disabled>+1</button>
    <div id="status"></div>
  </div>
  <a class="back" href="index.html">← back</a>

  <script>
    // ─── Configuration ────────────────────────────────────────────────────────
    // Counter is stored in Cloudflare D1 via a Worker proxy.
    // After deploying counter-worker, replace the placeholder below with the
    // URL printed by `wrangler deploy` (e.g. https://counter-worker.<subdomain>.workers.dev)
    const WORKER_URL = 'https://counter-worker.tfduesing.workers.dev';
    // ─────────────────────────────────────────────────────────────────────────

    // ─── Silly Sounds ────────────────────────────────────────────────────────
    let audioCtx = null;

    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function makeNoise(ctx, duration) {
      const sr = ctx.sampleRate;
      const buf = ctx.createBuffer(1, sr * duration, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    function sadTrombone(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      o.type = 'sawtooth';
      filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 2;
      const notes = [233, 220, 208, 196];
      const nd = 0.35;
      g.gain.setValueAtTime(0, t);
      for (let i = 0; i < 4; i++) {
        const nt = t + i * nd;
        o.frequency.setValueAtTime(notes[i], nt);
        g.gain.linearRampToValueAtTime(0.2, nt + 0.03);
        if (i < 3) {
          g.gain.setValueAtTime(0.2, nt + nd - 0.04);
          g.gain.linearRampToValueAtTime(0.05, nt + nd);
        }
      }
      const lastStart = t + 3 * nd;
      const vib = ctx.createOscillator();
      const vibG = ctx.createGain();
      vib.frequency.value = 5; vibG.gain.value = 8;
      vib.connect(vibG).connect(o.frequency);
      vib.start(lastStart); vib.stop(lastStart + 0.6);
      g.gain.setValueAtTime(0.2, lastStart + 0.3);
      g.gain.linearRampToValueAtTime(0, lastStart + 0.55);
      o.connect(filt).connect(g).connect(ctx.destination);
      o.start(t); o.stop(lastStart + 0.6);
    }

    function kazoo(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const filt = ctx.createBiquadFilter();
      const g = ctx.createGain();
      const trem = ctx.createOscillator();
      const tremG = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = 350;
      filt.type = 'lowpass'; filt.frequency.value = 1500;
      trem.frequency.value = 50; tremG.gain.value = 0.12;
      trem.connect(tremG).connect(g.gain);
      g.gain.setValueAtTime(0.18, t);
      g.gain.setValueAtTime(0.18, t + 0.22);
      g.gain.linearRampToValueAtTime(0, t + 0.3);
      o.connect(filt).connect(g).connect(ctx.destination);
      trem.start(t); o.start(t);
      trem.stop(t + 0.3); o.stop(t + 0.3);
    }

    function rubberChicken(ctx) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(900, t);
      o.frequency.exponentialRampToValueAtTime(300, t + 0.6);
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = 35; lfoG.gain.value = 50;
      lfo.connect(lfoG).connect(o.frequency);
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 2;
      g.gain.setValueAtTime(0.2, t);
      g.gain.setValueAtTime(0.18, t + 0.4);
      g.gain.linearRampToValueAtTime(0, t + 0.6);
      o.connect(filt).connect(g).connect(ctx.destination);
      lfo.start(t); o.start(t);
      lfo.stop(t + 0.6); o.stop(t + 0.6);
    }

    function recordScratch(ctx) {
      const t = ctx.currentTime;
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.4);
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.Q.value = 1;
      filt.frequency.setValueAtTime(3000, t);
      filt.frequency.exponentialRampToValueAtTime(300, t + 0.15);
      filt.frequency.exponentialRampToValueAtTime(2000, t + 0.25);
      filt.frequency.exponentialRampToValueAtTime(200, t + 0.35);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.3, t);
      g.gain.setValueAtTime(0.25, t + 0.25);
      g.gain.linearRampToValueAtTime(0, t + 0.35);
      ns.connect(filt).connect(g).connect(ctx.destination);
      ns.start(t); ns.stop(t + 0.35);
    }

    function airhorn(ctx) {
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.03);
      g.gain.setValueAtTime(0.25, t + 0.7);
      g.gain.linearRampToValueAtTime(0, t + 0.8);
      g.connect(ctx.destination);
      for (const freq of [480, 540, 720]) {
        const o = ctx.createOscillator();
        o.type = 'square';
        o.frequency.value = freq;
        const og = ctx.createGain();
        og.gain.value = 0.35;
        o.connect(og).connect(g);
        o.start(t); o.stop(t + 0.8);
      }
    }

    function dialUp(ctx) {
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.value = 0.15;
      g.connect(ctx.destination);
      const freqs = [1070, 1270, 2250, 1800, 980, 1650, 2100, 1400];
      freqs.forEach((f, i) => {
        const o = ctx.createOscillator();
        const eg = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = f;
        const start = i * 0.12;
        eg.gain.setValueAtTime(0, t + start);
        eg.gain.linearRampToValueAtTime(1, t + start + 0.01);
        eg.gain.setValueAtTime(1, t + start + 0.1);
        eg.gain.linearRampToValueAtTime(0, t + start + 0.12);
        o.connect(eg).connect(g);
        o.start(t + start); o.stop(t + start + 0.12);
      });
      const ns = ctx.createBufferSource();
      ns.buffer = makeNoise(ctx, 0.3);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 0.5;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0, t + 0.9);
      ng.gain.linearRampToValueAtTime(0.6, t + 0.92);
      ng.gain.setValueAtTime(0.6, t + 1.1);
      ng.gain.linearRampToValueAtTime(0, t + 1.2);
      ns.connect(bp).connect(ng).connect(g);
      ns.start(t + 0.9); ns.stop(t + 1.2);
    }

    function coinCollect(ctx) {
      const t = ctx.currentTime;
      const notes = [
        { f: 988, start: 0, dur: 0.08 },
        { f: 1319, start: 0.08, dur: 0.3 },
      ];
      notes.forEach(({ f, start, dur }) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'square';
        o.frequency.value = f;
        g.gain.setValueAtTime(0.18, t + start);
        g.gain.setValueAtTime(0.18, t + start + dur - 0.05);
        g.gain.linearRampToValueAtTime(0, t + start + dur);
        o.connect(g).connect(ctx.destination);
        o.start(t + start); o.stop(t + start + dur);
      });
    }

    function eightBitDeath(ctx) {
      const t = ctx.currentTime;
      for (let i = 0; i < 10; i++) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'square';
        o.frequency.value = 600 - i * 45;
        const start = i * 0.08;
        g.gain.setValueAtTime(0.14, t + start);
        g.gain.setValueAtTime(0.14, t + start + 0.06);
        g.gain.linearRampToValueAtTime(0, t + start + 0.08);
        o.connect(g).connect(ctx.destination);
        o.start(t + start); o.stop(t + start + 0.08);
      }
    }

    const sillySounds = [
      sadTrombone, kazoo, rubberChicken, recordScratch,
      airhorn, dialUp, coinCollect, eightBitDeath,
    ];

    function playSillySound() {
      const ctx = ensureAudioCtx();
      sillySounds[Math.floor(Math.random() * sillySounds.length)](ctx);
    }
    // ─────────────────────────────────────────────────────────────────────────

    const countEl  = document.getElementById('count');
    const btn      = document.getElementById('btn');
    const statusEl = document.getElementById('status');

    let ws = null;
    let reconnectDelay = 1000;
    let lastCount = null;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className   = isError ? 'error' : '';
    }

    function updateCount(count) {
      if (count === lastCount) return;
      lastCount = count;
      countEl.textContent = count.toLocaleString();
      countEl.className   = '';
    }

    // ─── WebSocket ─────────────────────────────────────────────────────────────
    function connectWebSocket() {
      const wsUrl = WORKER_URL.replace(/^http/, 'ws');
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        reconnectDelay = 1000;
        btn.disabled = false;
        setStatus('');
      };

      ws.onmessage = (e) => {
        try {
          const { count } = JSON.parse(e.data);
          if (count !== undefined) updateCount(count);
        } catch (err) {
          console.warn('WebSocket message parse error:', err.message);
        }
      };

      ws.onclose = () => {
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose will fire after this
      };
    }

    function scheduleReconnect() {
      setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        connectWebSocket();
      }, reconnectDelay);
    }

    // ─── Core ──────────────────────────────────────────────────────────────────
    async function fetchCounter() {
      countEl.className   = 'loading';
      countEl.textContent = '…';
      btn.disabled = true;
      setStatus('');

      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { count } = await res.json();
        updateCount(count);
        connectWebSocket();
      } catch (err) {
        setStatus(`Failed to load counter: ${err.message}`, true);
        countEl.textContent = '?';
        countEl.className   = '';
      }
    }

    async function increment() {
      playSillySound();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('increment');
      } else {
        // Fallback to HTTP if WebSocket is not connected
        btn.disabled = true;
        setStatus('Saving…');
        try {
          const res = await fetch(WORKER_URL, { method: 'POST' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { count } = await res.json();
          updateCount(count);
          setStatus('');
          btn.disabled = false;
        } catch (err) {
          setStatus(`Error: ${err.message}`, true);
          btn.disabled = false;
        }
      }
    }

    btn.addEventListener('click', increment);
    fetchCounter();
  </script>
</body>
</html>
