<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>What to Wear — Travel Clothing Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #3B82F6;
      --sky-dark: #1E3A8A;
      --sky-light: #EFF6FF;
      --coral: #F97316;
      --coral-dark: #EA6C0A;
      --bg: #EEF2F7;
      --card: #FFFFFF;
      --text: #1C1917;
      --muted: #6B7280;
      --border: #E2E8F0;
      --radius: 14px;
      --shadow: 0 2px 18px oklch(from var(--sky) l c h / 0.10);
      accent-color: var(--sky);
    }

    body {
      font-family: system-ui, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      color: var(--sky-dark);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-wrap: balance;
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px 24px;
      overflow: hidden;
      width: 100%;
      max-width: 520px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .autocomplete-wrapper {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      list-style: none;
      margin: 0;
      padding: 4px 0;
      z-index: 100;
      max-height: 248px;
      overflow-y: auto;

      &.hidden { display: none; }
    }

    .autocomplete-item {
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text);

      &:hover, &.active {
        background: var(--sky-light);
        color: var(--sky-dark);
      }

      & strong { font-weight: 600; }
    }

    label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    :is(input[type="text"], input[type="date"]) {
      appearance: none;
      box-sizing: border-box;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
      max-width: 100%;

      &:focus {
        border-color: var(--sky);
        box-shadow: 0 0 0 3px oklch(from var(--sky) l c h / 0.12);
      }
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;

      & .input-group {
        margin-bottom: 0;
        min-width: 0;
      }
    }

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      height: 52px;
      background: var(--coral);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, scale 0.1s;
      letter-spacing: 0.01em;

      &:hover  { background: var(--coral-dark); }
      &:active { scale: 0.98; }
      &:disabled { opacity: 0.65; cursor: default; scale: 1; }
    }

    .loading {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--sky);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { rotate: 360deg; } }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 22px;

      & h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(1.2rem, 4vw, 1.5rem);
        color: var(--sky-dark);
        margin-bottom: 3px;
        line-height: 1.2;
        text-wrap: balance;
      }
    }

    .result-dates {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .source-badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 50px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;

      &.forecast   { background: #DCFCE7; color: #166534; }
      &.historical { background: #FEF9C3; color: #854D0E; }
      &.estimate   { background: #F3F4F6; color: #374151; }
      &.mixed      { background: #EDE9FE; color: #4C1D95; }
    }

    .unit-toggle {
      display: flex;
      border: 1.5px solid #BFDBFE;
      border-radius: 8px;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;

      & button {
        background: none;
        border: none;
        padding: 4px 10px;
        font-size: 0.85rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        color: #93C5FD;
        transition: background 0.15s, color 0.15s;

        &.active {
          background: var(--sky-light);
          color: var(--sky-dark);
          cursor: default;
        }

        &:not(.active):hover {
          background: #EFF6FF;
          color: var(--sky-dark);
        }
      }

      & .divider {
        width: 1.5px;
        background: #BFDBFE;
        flex-shrink: 0;
      }
    }

    .temp-range-bar {
      position: relative;
      height: 10px;
      border-radius: 10px;
      background: linear-gradient(90deg,
        #93C5FD  0%,
        #6EE7B7 20%,
        #FCD34D 50%,
        #FB923C 75%,
        #EF4444 100%
      );
      margin-bottom: 10px;
    }

    .temp-range-highlight {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(0, 0, 0, 0.35);
    }

    .temp-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 22px;

      & .temp-val {
        font-weight: 700;
        font-size: 0.92rem;
        color: var(--text);
      }
    }

    .recommendation {
      font-size: 0.98rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 24px;
      padding: 16px 18px;
      background: var(--sky-light);
      border-radius: 10px;
      border-inline-start: 4px solid var(--sky);
    }

    .packing-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
    }

    .packing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pack-item {
      display: flex;
      align-items: center;
      gap: 9px;
      background: #F9FAFB;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 0.875rem;
      line-height: 1.3;
    }

    .item-emoji {
      font-size: 1.25rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; translate: 0 10px; }
      to   { opacity: 1; translate: 0 0; }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }

    footer {
      text-align: center;
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: auto;
      padding-top: 20px;
      max-width: 520px;

      & a {
        color: var(--sky);
        text-decoration: none;

        &:hover { text-decoration: underline; }
      }
    }

    @media (max-width: 420px) {
      .packing-grid  { grid-template-columns: 1fr; }
      .date-row      { grid-template-columns: 1fr; }
      .controls      { flex-direction: column; align-items: flex-end; gap: 5px; }
    }
  </style>
</head>
<body>

<header>
  <h1>What to Wear</h1>
  <p class="subtitle">Weather-based packing advice for your trip</p>
</header>

<!-- Input card -->
<div class="card" id="input-card">
  <div class="input-group">
    <label for="location">Where are you going?</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="location" placeholder="e.g., Tokyo, Japan" autocomplete="off"
        role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="autocomplete-list" />
      <ul class="autocomplete-list hidden" id="autocomplete-list" role="listbox"></ul>
    </div>
  </div>
  <div class="date-row">
    <div class="input-group">
      <label for="start-date">From</label>
      <input type="date" id="start-date" />
    </div>
    <div class="input-group">
      <label for="end-date">To</label>
      <input type="date" id="end-date" />
    </div>
  </div>
  <p class="error-msg hidden" id="error-msg"></p>
  <button class="btn" id="submit-btn" onclick="handleSubmit()">Pack for my trip →</button>
</div>

<!-- Loading card -->
<div class="card hidden" id="loading-card">
  <div class="loading">
    <div class="spinner"></div>
    <p>Checking the weather…</p>
  </div>
</div>

<!-- Results card -->
<div class="card hidden" id="results">
  <div class="results-header">
    <div>
      <h2 id="result-location"></h2>
      <p class="result-dates" id="result-dates"></p>
    </div>
    <div class="controls">
      <span class="source-badge" id="source-badge"></span>
      <div class="unit-toggle" id="unit-toggle">
        <button id="unit-btn-f" onclick="setUnit('F')" class="active">°F</button>
        <div class="divider"></div>
        <button id="unit-btn-c" onclick="setUnit('C')">°C</button>
      </div>
    </div>
  </div>

  <!-- Temperature range bar -->
  <div class="temp-range-bar" id="temp-range-bar">
    <div class="temp-range-highlight" id="temp-highlight"></div>
  </div>
  <div class="temp-stats">
    <span>Low: <span class="temp-val" id="temp-low"></span></span>
    <span>Avg high: <span class="temp-val" id="temp-avg"></span></span>
    <span>Peak: <span class="temp-val" id="temp-high"></span></span>
  </div>

  <div class="recommendation" id="recommendation"></div>

  <p class="packing-title">What to pack</p>
  <div class="packing-grid" id="packing-grid"></div>
</div>

<footer>
  Powered by <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> ·
  Weather data is approximate and intended for trip planning only
</footer>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentUnit = 'F';
let currentStats = null;

// ─── Date Utilities ───────────────────────────────────────────────────────────
function dateToStr(d) {
  // Returns YYYY-MM-DD in local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function strToDate(s) {
  // Parse as LOCAL date (avoids UTC midnight offset issues)
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function shiftYearBack(s) {
  const [y, m, d] = s.split('-');
  return `${parseInt(y, 10) - 1}-${m}-${d}`;
}

function buildDayRange(startStr, endStr) {
  const days = [];
  const end = strToDate(endStr);
  const cur = strToDate(startStr);
  while (cur <= end) {
    days.push(dateToStr(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function formatDateRange(start, end) {
  const opts = { month: 'short', day: 'numeric', year: 'numeric' };
  const s = strToDate(start).toLocaleDateString('en-US', opts);
  const e = strToDate(end).toLocaleDateString('en-US', opts);
  return `${s} – ${e}`;
}

// ─── Temperature Helpers ──────────────────────────────────────────────────────
function cToF(c) { return c * 9 / 5 + 32; }

function fmtTemp(celsius) {
  if (currentUnit === 'F') return `${Math.round(cToF(celsius))}°F`;
  return `${Math.round(celsius)}°C`;
}

// Map a Celsius value to a 0–100% position on the temp gradient bar
// Scale: -20°C (0%) to 45°C (100%)
function tempToPct(celsius) {
  const min = -20, max = 45;
  return Math.min(100, Math.max(0, (celsius - min) / (max - min) * 100));
}

// ─── API Calls ────────────────────────────────────────────────────────────────
async function geocode(location) {
  // Split "City, State/Country" into city name + qualifiers for disambiguation
  let inputParts = location.split(',').map(s => s.trim()).filter(Boolean);
  // Also handle "Washington DC" (no comma) — detect trailing 2–3 letter caps abbreviation
  if (inputParts.length === 1) {
    const tokens = inputParts[0].split(/\s+/);
    const last = tokens[tokens.length - 1].replace(/\./g, '');
    if (tokens.length > 1 && /^[A-Z]{2,3}$/.test(last)) {
      inputParts = [tokens.slice(0, -1).join(' '), last];
    }
  }
  const cityName = inputParts[0].replace(/\./g, '').trim(); // strip dots (e.g. "D.C." → "DC")
  const qualifiers = inputParts.slice(1);
  const count = qualifiers.length > 0 ? 5 : 1;

  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=${count}&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocoding request failed');
  const data = await res.json();
  if (!data.results || data.results.length === 0) throw new Error('Location not found');

  let best = data.results[0];
  if (qualifiers.length > 0) {
    let bestScore = -1;
    for (const r of data.results) {
      const haystack = [r.admin1, r.admin2, r.admin3, r.country, r.country_code]
        .filter(Boolean).join(' ').toLowerCase();
      const score = qualifiers.reduce((n, q) => {
        const norm = q.toLowerCase().replace(/\./g, '');
        return n + (haystack.includes(norm) ? 1 : 0);
      }, 0);
      if (score > bestScore) { bestScore = score; best = r; }
    }
  }

  const r = best;
  const parts = [r.name];
  if (r.admin1 && r.admin1 !== r.name) parts.push(r.admin1);
  if (r.country) parts.push(r.country);
  return { lat: r.latitude, lon: r.longitude, timezone: r.timezone || 'UTC', displayName: parts.join(', ') };
}

async function fetchForecast(lat, lon, timezone, start, end) {
  const params = new URLSearchParams({
    latitude: lat, longitude: lon,
    daily: 'temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,uv_index_max',
    timezone, start_date: start, end_date: end,
    temperature_unit: 'celsius'
  });
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!res.ok) throw new Error('Forecast API request failed');
  const data = await res.json();
  return parseDailyData(data.daily);
}

async function fetchArchive(lat, lon, timezone, start, end) {
  const params = new URLSearchParams({
    latitude: lat, longitude: lon,
    daily: 'temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,uv_index_max',
    timezone, start_date: start, end_date: end,
    temperature_unit: 'celsius'
  });
  const res = await fetch(`https://archive-api.open-meteo.com/v1/archive?${params}`);
  if (!res.ok) throw new Error('Archive API request failed');
  const data = await res.json();
  return parseDailyData(data.daily);
}

function parseDailyData(daily) {
  if (!daily || !daily.time) return [];
  return daily.time.map((date, i) => ({
    date,
    maxC:       daily.temperature_2m_max?.[i]              ?? null,
    minC:       daily.temperature_2m_min?.[i]              ?? null,
    precip:     daily.precipitation_sum?.[i]               ?? null,
    precipProb: daily.precipitation_probability_max?.[i]   ?? null,
    wind:       daily.wind_speed_10m_max?.[i]              ?? null,
    uv:         daily.uv_index_max?.[i]                    ?? null,
  })).filter(d => d.maxC !== null && d.minC !== null);
}

// ─── Date Routing + Fetch Orchestration ──────────────────────────────────────
async function fetchAllWeather(lat, lon, timezone, startStr, endStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const forecastLimit = new Date(today);
  forecastLimit.setDate(forecastLimit.getDate() + 14);

  const allDays  = buildDayRange(startStr, endStr);
  const pastDays = allDays.filter(d => strToDate(d) < today);
  const nearDays = allDays.filter(d => { const dt = strToDate(d); return dt >= today && dt <= forecastLimit; });
  const farDays  = allDays.filter(d => strToDate(d) > forecastLimit);

  const promises = [
    pastDays.length
      ? fetchArchive(lat, lon, timezone, pastDays[0], pastDays[pastDays.length - 1])
      : Promise.resolve([]),

    nearDays.length
      ? fetchForecast(lat, lon, timezone, nearDays[0], nearDays[nearDays.length - 1])
      : Promise.resolve([]),

    farDays.length
      ? fetchArchive(lat, lon, timezone, shiftYearBack(farDays[0]), shiftYearBack(farDays[farDays.length - 1]))
          .then(data => data.map((d, i) => ({ ...d, date: farDays[i] ?? d.date, isEstimate: true })))
      : Promise.resolve([]),
  ];

  const [pastData, nearData, farData] = await Promise.all(promises);
  const allData = [...pastData, ...nearData, ...farData]
    .sort((a, b) => a.date.localeCompare(b.date));

  const hasPast = pastDays.length > 0;
  const hasNear = nearDays.length > 0;
  const hasFar  = farDays.length  > 0;

  let sourceLabel;
  if (hasNear && !hasPast && !hasFar)  sourceLabel = 'forecast';
  else if (hasPast && !hasNear && !hasFar) sourceLabel = 'historical';
  else if (hasFar && !hasNear && !hasPast) sourceLabel = 'estimate';
  else sourceLabel = 'mixed';

  return { data: allData, sourceLabel };
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function computeStats(daily) {
  const valid = daily.filter(d => d.maxC !== null && d.minC !== null);
  if (!valid.length) throw new Error('No valid weather data returned for that location and date range.');

  const avgMaxC    = valid.reduce((s, d) => s + d.maxC, 0) / valid.length;
  const avgMinC    = valid.reduce((s, d) => s + d.minC, 0) / valid.length;
  const peakMaxC   = Math.max(...valid.map(d => d.maxC));
  const troughMinC = Math.min(...valid.map(d => d.minC));
  const avgC       = (avgMaxC + avgMinC) / 2;
  const tempSwing  = valid.reduce((s, d) => s + (d.maxC - d.minC), 0) / valid.length;
  const rainyDays  = valid.filter(d =>
    (d.precip !== null && d.precip > 1) || (d.precipProb !== null && d.precipProb > 40)
  ).length;
  const totalDays  = valid.length;
  const winds      = valid.map(d => d.wind).filter(v => v !== null);
  const maxWind    = winds.length ? Math.max(...winds) : 0;
  const uvs        = valid.map(d => d.uv).filter(v => v !== null);
  const maxUV      = uvs.length ? Math.max(...uvs) : 0;

  return { avgMaxC, avgMinC, peakMaxC, troughMinC, avgC, tempSwing, rainyDays, totalDays, maxWind, maxUV };
}

// ─── Recommendation Engine ────────────────────────────────────────────────────
function getTier(avgMaxC) {
  if (avgMaxC > 35) return 'scorching';
  if (avgMaxC > 29) return 'hot';
  if (avgMaxC > 21) return 'warm';
  if (avgMaxC > 13) return 'mild';
  if (avgMaxC > 7)  return 'cool';
  if (avgMaxC > 0)  return 'cold';
  return 'frigid';
}

const TIERS = {
  scorching: {
    summary: "It's going to be extremely hot — pack only the lightest, most breathable fabrics you own. Think tank tops, shorts, and linen or moisture-wicking materials. Anything heavier will be miserable.",
    items: [['🎽','Tank tops / light tops'], ['🩳','Shorts'], ['👗','Lightweight dresses or linen'],
            ['👟','Breathable footwear'], ['🕶️','Sunglasses'], ['☀️','Sunscreen (SPF 50+)'], ['🧢','Sun hat']],
  },
  hot: {
    summary: "It's going to be hot — shorts and short-sleeved shirts are the way to go. Stick to light, breathable fabrics, and you'll be comfortable.",
    items: [['👕','Short-sleeved shirts'], ['🩳','Shorts'], ['👗','Light dresses or skirts'],
            ['👟','Comfortable walking shoes'], ['🕶️','Sunglasses']],
  },
  warm: {
    summary: "Comfortably warm weather — t-shirts and light pants or shorts will serve you well. You may want a thin layer for air-conditioned restaurants or a slightly cooler evening.",
    items: [['👕','T-shirts'], ['🩳','Shorts or light pants'], ['🧥','Light cardigan or layer for evenings'],
            ['👟','Comfortable walking shoes']],
  },
  mild: {
    summary: "Mild, pleasant weather — not hot, not cold. Jeans or light pants with long-sleeved shirts will be comfortable, and a light jacket is worth bringing for cooler moments.",
    items: [['👖','Jeans or light pants'], ['👚','Long-sleeved shirts'], ['🧥','Light jacket'],
            ['👟','Comfortable shoes or sneakers']],
  },
  cool: {
    summary: "It'll be noticeably cool — you'll want warmer clothes. Pack a proper jacket, warm pants, and layers you can adjust throughout the day.",
    items: [['👖','Warm pants'], ['🧶','Sweater or fleece'], ['🧥','Jacket (medium-weight)'],
            ['🧣','Light scarf'], ['🥾','Closed-toe shoes or boots']],
  },
  cold: {
    summary: "It's cold out there — a warm coat is essential. Layer up with sweaters or thermals underneath, and don't leave home without a hat and gloves.",
    items: [['🧥','Warm coat'], ['🧶','Sweaters or warm layers underneath'], ['🩱','Thermal underlayer'],
            ['🧢','Hat'], ['🧤','Gloves'], ['🧣','Scarf'], ['🥾','Warm boots or insulated shoes']],
  },
  frigid: {
    summary: "It's seriously cold — a heavy winter coat is non-negotiable. Thermal underlayers, a warm hat, scarf, and insulated gloves are all essential, not just nice-to-haves.",
    items: [['🧥','Heavy winter coat'], ['🩱','Thermal underlayers'], ['🧶','Warm sweaters'],
            ['🧢','Warm hat'], ['🧤','Insulated gloves'], ['🧣','Scarf'], ['🥾','Insulated winter boots']],
  },
};

function buildRecommendation(tier, stats) {
  const { troughMinC, tempSwing, rainyDays, totalDays, maxWind, maxUV } = stats;

  const items = [...TIERS[tier].items];
  const extras = [];

  // Determine active modifiers
  const isRainy     = rainyDays >= Math.max(1, Math.ceil(totalDays * 0.3));
  const isWindy     = maxWind > 30;
  const isHighUV    = maxUV >= 7;
  const hasSwing    = tempSwing > 12;
  const coldNights  = troughMinC < 5 && tier !== 'cold' && tier !== 'frigid';

  if (isRainy)   extras.push("Rain is likely — pack a waterproof jacket or a compact travel umbrella.");
  if (isWindy)   extras.push("It can get windy — a windproof outer layer will help.");
  if (isHighUV)  extras.push("UV levels are strong — sunscreen and a sun hat are a good idea.");
  if (hasSwing)  extras.push("Temperatures vary quite a bit between day and night, so bring layers you can easily add or remove.");
  else if (coldNights) extras.push("Evenings can get chilly even if daytime is pleasant, so pack a warm layer for after dark.");

  let summary = TIERS[tier].summary;
  if (extras.length) summary += ' ' + extras.join(' ');

  // Add modifier items (avoid duplicating existing items)
  const existingLabels = new Set(items.map(([, label]) => label));

  if (isRainy) {
    if (!existingLabels.has('Waterproof jacket or rain poncho')) items.push(['☔','Waterproof jacket or rain poncho']);
    if (!existingLabels.has('Compact travel umbrella'))          items.push(['☂️','Compact travel umbrella']);
  }
  if (isWindy && !existingLabels.has('Windproof outer layer')) {
    items.push(['💨','Windproof outer layer']);
  }
  if ((isHighUV || tier === 'scorching' || tier === 'hot') && !existingLabels.has('Sunscreen (SPF 30+)')) {
    items.push(['☀️','Sunscreen (SPF 30+)']);
  }
  if ((isHighUV || tier === 'scorching' || tier === 'hot') && !existingLabels.has('Sun hat') && !existingLabels.has('Sun hat')) {
    items.push(['🧢','Sun hat']);
  }
  if (coldNights && !existingLabels.has('Warm layer for evenings')) {
    items.push(['🧥','Warm layer for evenings']);
  }

  return { summary, items };
}

// ─── Display ──────────────────────────────────────────────────────────────────
const BADGE_LABELS = {
  forecast:   'Live Forecast',
  historical: 'Historical',
  estimate:   'Climate Estimate',
  mixed:      'Mixed Data',
};

function renderTemps() {
  if (!currentStats) return;
  const { troughMinC, peakMaxC, avgMaxC } = currentStats;

  document.getElementById('temp-low').textContent  = fmtTemp(troughMinC);
  document.getElementById('temp-avg').textContent  = fmtTemp(avgMaxC);
  document.getElementById('temp-high').textContent = fmtTemp(peakMaxC);


  // Update range highlight bar
  const lo  = tempToPct(troughMinC);
  const hi  = tempToPct(peakMaxC);
  const hl  = document.getElementById('temp-highlight');
  hl.style.left  = `${lo}%`;
  hl.style.width = `${Math.max(hi - lo, 2)}%`;
}

function displayResults(locationData, startStr, endStr, weather, stats, rec) {
  document.getElementById('result-location').textContent = locationData.displayName;
  document.getElementById('result-dates').textContent    = formatDateRange(startStr, endStr);

  const badge = document.getElementById('source-badge');
  badge.textContent = BADGE_LABELS[weather.sourceLabel] || weather.sourceLabel;
  badge.className   = `source-badge ${weather.sourceLabel}`;

  currentStats = stats;
  renderTemps();

  document.getElementById('recommendation').textContent = rec.summary;

  const grid = document.getElementById('packing-grid');
  grid.innerHTML = rec.items.map(([emoji, label]) =>
    `<div class="pack-item"><span class="item-emoji">${emoji}</span><span>${label}</span></div>`
  ).join('');

  const resultsEl = document.getElementById('results');
  resultsEl.classList.remove('hidden', 'fade-in');
  // Trigger reflow to restart animation
  void resultsEl.offsetWidth;
  resultsEl.classList.add('fade-in');
  setTimeout(() => resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// ─── Unit Toggle ──────────────────────────────────────────────────────────────
function setUnit(unit) {
  if (unit === currentUnit) return;
  currentUnit = unit;
  document.getElementById('unit-btn-f').classList.toggle('active', unit === 'F');
  document.getElementById('unit-btn-c').classList.toggle('active', unit === 'C');
  renderTemps();
}

// ─── Form & Errors ────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearError() {
  document.getElementById('error-msg').classList.add('hidden');
}

function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  btn.disabled    = on;
  btn.textContent = on ? 'Checking weather…' : 'Pack for my trip →';
  document.getElementById('loading-card').classList.toggle('hidden', !on);
  if (on) document.getElementById('results').classList.add('hidden');
}

async function handleSubmit() {
  closeLocationAutocomplete();
  const location = document.getElementById('location').value.trim();
  const startStr = document.getElementById('start-date').value;
  const endStr   = document.getElementById('end-date').value;

  clearError();

  if (!location)  { showError('Please enter a destination.'); return; }
  if (!startStr)  { showError('Please choose a start date.'); return; }
  if (!endStr)    { showError('Please choose an end date.'); return; }

  const startDate = strToDate(startStr);
  const endDate   = strToDate(endStr);

  if (endDate < startDate) { showError('Your end date must be after your start date.'); return; }

  const diffDays = Math.round((endDate - startDate) / 86400000) + 1;
  if (diffDays > 30) { showError('Please keep your date range to 30 days or fewer.'); return; }

  setLoading(true);
  try {
    const locationData = await geocode(location);
    document.getElementById('location').value = locationData.displayName;
    const weather      = await fetchAllWeather(locationData.lat, locationData.lon, locationData.timezone, startStr, endStr);

    if (!weather.data.length) throw new Error('No weather data is available for that location and date range. Please try different dates.');

    const stats = computeStats(weather.data);
    const tier  = getTier(stats.avgMaxC);
    const rec   = buildRecommendation(tier, stats);

    displayResults(locationData, startStr, endStr, weather, stats, rec);
  } catch (err) {
    if (err.message === 'Location not found') {
      showError("We couldn't find that location. Try being more specific — e.g., \"Paris, France\" or \"Miami, FL\".");
    } else {
      showError(err.message || 'Something went wrong. Please try again.');
    }
    document.getElementById('results').classList.add('hidden');
  } finally {
    setLoading(false);
  }
}

// ─── Autocomplete ─────────────────────────────────────────────────────────────
let closeLocationAutocomplete = () => {};  // exposed so handleSubmit can call it

(function setupAutocomplete() {
  const input = document.getElementById('location');
  const list  = document.getElementById('autocomplete-list');
  let activeIdx = -1;
  let debounceTimer = null;

  function formatResult(r) {
    const parts = [r.name];
    if (r.admin1 && r.admin1 !== r.name) parts.push(r.admin1);
    if (r.country) parts.push(r.country);
    return parts.join(', ');
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function highlightMatch(text, query) {
    const safe = escapeHtml(text);
    if (!query) return safe;
    const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp(`(${escapeHtml(escapedQuery)})`, 'gi'), '<strong>$1</strong>');
  }

  function closeSuggestions() {
    list.innerHTML = '';
    list.classList.add('hidden');
    input.setAttribute('aria-expanded', 'false');
    input.removeAttribute('aria-activedescendant');
    activeIdx = -1;
  }
  closeLocationAutocomplete = closeSuggestions;

  function renderSuggestions(results, query) {
    list.innerHTML = '';
    if (!results || results.length === 0) { closeSuggestions(); return; }

    // Deduplicate by formatted name
    const seen = new Set();
    const deduped = results.filter(r => {
      const name = formatResult(r);
      if (seen.has(name)) return false;
      seen.add(name);
      return true;
    });

    // Sort: prefer results whose name starts with the query
    const q = query.toLowerCase();
    deduped.sort((a, b) => {
      const aStarts = a.name.toLowerCase().startsWith(q);
      const bStarts = b.name.toLowerCase().startsWith(q);
      if (aStarts && !bStarts) return -1;
      if (!aStarts && bStarts) return 1;
      return 0;
    });

    deduped.slice(0, 6).forEach((r, i) => {
      const li = document.createElement('li');
      li.className = 'autocomplete-item';
      li.setAttribute('role', 'option');
      li.setAttribute('id', `autocomplete-item-${i}`);
      li.innerHTML = highlightMatch(formatResult(r), query);
      // mousedown fires before blur on desktop; touchstart fires before blur on mobile
      function selectItem(e) {
        e.preventDefault();
        input.value = formatResult(r);
        closeSuggestions();
        clearError();
      }
      li.addEventListener('mousedown', selectItem);
      li.addEventListener('touchstart', selectItem, { passive: false });
      list.appendChild(li);
    });
    list.classList.remove('hidden');
    input.setAttribute('aria-expanded', 'true');
    activeIdx = -1;
  }

  function setActive(idx) {
    const items = list.querySelectorAll('.autocomplete-item');
    items.forEach(el => el.classList.remove('active'));
    if (idx >= 0 && idx < items.length) {
      items[idx].classList.add('active');
      items[idx].scrollIntoView({ block: 'nearest' });
      input.setAttribute('aria-activedescendant', `autocomplete-item-${idx}`);
    } else {
      input.removeAttribute('aria-activedescendant');
    }
    activeIdx = idx;
  }

  async function fetchAndRender(query) {
    if (query.length < 2) { closeSuggestions(); return; }
    if (!/[a-zA-Z]/.test(query)) { closeSuggestions(); return; }
    try {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=en&format=json`;
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      // Only update if input still matches (avoid stale renders)
      if (input.value.trim() === query) renderSuggestions(data.results || [], query);
    } catch {}
  }

  input.addEventListener('input', () => {
    clearError();
    // Hide stale results panel while the user re-edits the location
    document.getElementById('results').classList.add('hidden');
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    debounceTimer = setTimeout(() => fetchAndRender(q), 250);
  });

  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (list.classList.contains('hidden') || items.length === 0) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActive(Math.min(activeIdx + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActive(activeIdx <= 0 ? 0 : activeIdx - 1);
    } else if (e.key === 'Enter' && activeIdx >= 0) {
      e.stopPropagation(); // prevent form submit
      input.value = items[activeIdx].textContent;
      closeSuggestions();
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });

  input.addEventListener('blur', () => closeSuggestions());
})();

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  // Default dates: today → today + 7 days
  const today = new Date();
  const next7 = new Date(today);
  next7.setDate(next7.getDate() + 7);
  document.getElementById('start-date').value = dateToStr(today);
  document.getElementById('end-date').value   = dateToStr(next7);

  document.getElementById('start-date').addEventListener('change', clearError);
  document.getElementById('end-date').addEventListener('change', clearError);

  // Enter key submits (only when autocomplete is not handling it)
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') handleSubmit();
  });
})();
</script>
