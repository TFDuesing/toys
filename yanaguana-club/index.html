<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Yanaguana Fiesta Club</title>
  <meta name="description" content="A San Antonio social club celebrating the spirit of Fiesta — friends, food, music, and the city we love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1a3d6e;
      --gold:      #c49a3a;
      --turquoise: #4ab8d6;
      --green:     #2d6b32;
      --hot-pink:  #e8177f;
      --orange:    #f47c20;
      --yellow:    #f5c518;
      --purple:    #8b2fc9;
      --red:       #d92b2b;
    }

    body {
      font-family: 'Nunito', system-ui, Helvetica, Arial, sans-serif;
      background: var(--navy);
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Papel Picado Banner ─────────────────────────────── */
    .picado-banner {
      width: 100%;
      line-height: 0;
      background: var(--navy);
    }

    .picado-banner img {
      width: 100%;
      display: block;
    }

    /* ── Hero ────────────────────────────────────────────── */
    .hero {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem 5rem;
      text-align: center;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 65% 65% at 50% 45%, rgba(196, 154, 58, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      width: min(300px, 80vw);
      height: auto;
      border-radius: 50%;
      border: 4px solid var(--gold);
      box-shadow:
        0 0 0 8px rgba(196, 154, 58, 0.12),
        0 0 40px rgba(196, 154, 58, 0.4),
        0 0 80px rgba(196, 154, 58, 0.15);
      margin-bottom: 2.25rem;
      position: relative;
      z-index: 1;
      background: var(--navy);
      min-height: 100px;
    }

    h1 {
      font-family: 'Lilita One', cursive;
      font-size: clamp(2.2rem, 8vw, 4rem);
      color: var(--gold);
      letter-spacing: 0.01em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
      text-wrap: balance;
      position: relative;
      z-index: 1;
      line-height: 1.1;
    }

    .tagline {
      color: var(--turquoise);
      font-size: clamp(0.95rem, 2.8vw, 1.15rem);
      font-weight: 600;
      max-width: 560px;
      margin-top: 1.25rem;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .tagline span {
      display: block;
    }

    .tagline span + span {
      margin-top: 0.75rem;
    }

  </style>
</head>
<body>

  <div class="picado-banner" aria-hidden="true">
    <img src="papel-picado-banner.svg" alt="">
  </div>

  <header class="hero">
    <img class="logo" src="yanaguana-club-logo.png" alt="Yanaguana Fiesta Club — a leaping navy jaguar with Aztec spots and a roadrunner soar above the Alamo and Tower of the Americas, surrounded by a spring pool, agave, and cactus">
    <h1>Yanaguana Fiesta Club</h1>
    <p class="tagline">
      <span>The native Payaya people knew this place and its river as <em>Yanaguana</em>.</span>
      <span>Today, we celebrate our natural and cultural heritage as The Yanaguana Fiesta Club.</span>
    </p>
  </header>


</body>
</html>
