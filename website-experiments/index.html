<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thomas F. Duesing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #2d3343;
    padding: 10px;
    font-family: Georgia, "Times New Roman", Times, serif;
  }

  main {
    min-height: calc(100vh - 20px);
    background: url("clouds.jpeg") center / cover no-repeat;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .content { max-width: 700px; }

  h1 {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    font-weight: bold;
    letter-spacing: 0.01em;
  }

  hr {
    border: none;
    border-top: 1px solid #555;
    width: 60%;
    margin: 0.8rem auto;
  }

  p {
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-style: italic;
    line-height: 1.6;
  }

  .links {
    margin-top: 1.5rem;
    font-size: clamp(0.95rem, 2vw, 1.15rem);
  }

  a {
    font-style: italic;
    color: #000;
  }
</style>
</head>
<body>
<main>
  <div class="content">
    <h1>Thomas F. Duesing</h1>
    <hr>
    <p>Platform Product Manager<br>San Antonio, Texas</p>
    <p class="links"><a href="/essays/">Essays</a> | <a href="https://www.linkedin.com/in/tfduesing">LinkedIn</a></p>
  </div>
</main>
</body>
</html>
