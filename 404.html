<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Toys</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --text: #222;
      --muted: #666;
      --accent: #1a6fb5;
      --card: #fff;
      --border: #ddd;
      --border-hover: #999;
    }

    body {
      font-family: system-ui, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 3rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .toy {
      font-size: 3rem;
      display: inline-block;
      animation: wobble 2s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { rotate: -8deg; }
      50% { rotate: 8deg; }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 1rem;
      text-wrap: balance;
    }

    p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    a {
      display: inline-block;
      margin-top: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      transition: border-color 0.15s, box-shadow 0.15s;

      &:hover {
        border-color: var(--border-hover);
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="toy">🧸</div>
    <h1>404</h1>
    <p>This toy seems to have rolled under the couch.</p>
    <a href="/">Back to the toy box</a>
  </main>
</body>
</html>
